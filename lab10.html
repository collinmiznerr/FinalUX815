<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 10 — Final Project</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .about-card {
      text-align: center;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 14px;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bio-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-navy);
      margin-bottom: 4px;
    }
    .bio-role {
      font-size: 12px;
      color: var(--color-sage);
    }
    .find-me-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .find-link {
      display: block;
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--color-navy);
      transition: background 0.15s;
    }
    .find-link:hover {
      background: var(--color-tag-bg);
    }
    .labs-completed {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .labs-completed li {
      font-size: 13px;
      color: var(--color-navy);
      list-style: none;
    }
    .full-card {
      background: var(--color-white);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 16px;
    }
  </style>
</head>
<body>
